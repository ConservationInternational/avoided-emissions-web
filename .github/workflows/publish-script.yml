name: Publish R-Analysis Script

on:
  push:
    branches:
      - main
    paths:
      - 'r-analysis/configuration.json'
      - 'r-analysis/requirements.txt'
      - 'r-analysis/src/**'
  workflow_dispatch:
    inputs:
      api_environment:
        description: 'Target API environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  STAGING_API_URL: https://api-staging.trends.earth
  PRODUCTION_API_URL: https://api.trends.earth

jobs:
  publish-script:
    name: Publish to trends.earth API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install trends.earth CLI
        run: pip install git+https://github.com/ConservationInternational/trends.earth-CLI.git

      - name: Determine API URL
        id: api-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.api_environment }}"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "url=${{ env.PRODUCTION_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ env.STAGING_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure CLI
        run: |
          printf 'url_api: "%s"\n' "${{ steps.api-url.outputs.url }}" > ~/.tecli.yml

      - name: Obtain access token via OAuth2 Client Credentials
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          CLIENT_ID: ${{ secrets.TRENDS_EARTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TRENDS_EARTH_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -sf -X POST "${API_URL}/api/v1/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${CLIENT_ID}\",\"client_secret\":\"${CLIENT_SECRET}\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to obtain access token"
            exit 1
          fi

          # Write JWT into CLI config (same key the CLI uses after login)
          python3 -c "
          import yaml
          with open('$HOME/.tecli.yml', 'r') as f:
              cfg = yaml.safe_load(f) or {}
          cfg['JWT'] = '${TOKEN}'
          with open('$HOME/.tecli.yml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          "
          echo "::notice::Access token obtained successfully"

      - name: Publish script
        run: |
          cd r-analysis
          trends publish --overwrite

      - name: Verify publication
        run: |
          cd r-analysis
          trends info
