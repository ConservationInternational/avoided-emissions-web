name: Publish R-Analysis Script & Build Image
run-name: "Publish ${{ github.ref_name }} to ${{ github.event_name == 'workflow_dispatch' && inputs.api_environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}"

on:
  push:
    branches:
      - main
    paths:
      - 'r-analysis/**'
      - '.github/workflows/publish-script.yml'
  workflow_dispatch:
    inputs:
      api_environment:
        description: 'Target API environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PRODUCTION_API_URL: https://api.trends.earth
  STAGING_API_URL: https://api-staging.trends.earth
  AWS_REGION: us-east-1
  ECR_REPOSITORY_RANALYSIS: avoided-emissions-ranalysis

permissions:
  id-token: write
  contents: read

jobs:
  determine-environment:
    name: Determine target environment
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.api_environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  publish-script:
    name: Publish to trends.earth API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: determine-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install trends.earth CLI
        run: pip install git+https://github.com/ConservationInternational/trends.earth-CLI.git

      - name: Determine API URL
        id: api-url
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"

          if [ "$ENV" = "production" ]; then
            echo "url=${{ env.PRODUCTION_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ env.STAGING_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure CLI
        run: |
          printf 'url_api: "%s"\n' "${{ steps.api-url.outputs.url }}" > ~/.tecli.yml

      - name: Obtain access token via OAuth2 Client Credentials
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          CLIENT_ID: ${{ secrets.TRENDSEARTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TRENDSEARTH_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -sf -X POST "${API_URL}/api/v1/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${CLIENT_ID}\",\"client_secret\":\"${CLIENT_SECRET}\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to obtain access token"
            exit 1
          fi

          # Write JWT and expiration into CLI config so the CLI
          # recognises the token as valid and skips refresh.
          python3 -c "
          import yaml
          from datetime import datetime, timedelta
          with open('$HOME/.tecli.yml', 'r') as f:
              cfg = yaml.safe_load(f) or {}
          cfg['JWT'] = '${TOKEN}'
          expires_in = int('${EXPIRES_IN}') if '${EXPIRES_IN}' not in ('', 'null') else 1800
          cfg['token_expires_at'] = (datetime.now() + timedelta(seconds=expires_in)).isoformat()
          with open('$HOME/.tecli.yml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          "
          echo "::notice::Access token obtained successfully"

      - name: Publish script
        run: |
          cd r-analysis
          trends publish --overwrite

      - name: Verify publication
        run: |
          cd r-analysis
          trends info

  build-ranalysis:
    name: Build & Push R Analysis Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
        role-session-name: GitHubActionsRanalysis
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      run: |
        REPO="${{ env.ECR_REPOSITORY_RANALYSIS }}"
        if ! aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null; then
          echo "Creating ECR repository: $REPO"
          aws ecr create-repository \
            --repository-name "$REPO" \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE
        else
          echo "ECR repository exists: $REPO"
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push R analysis image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        IMAGE_TAG="${ENVIRONMENT}-${SHORT_SHA}"
        IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPOSITORY_RANALYSIS }}:$IMAGE_TAG"

        TAGS="--tag $IMAGE_URI --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY_RANALYSIS }}:${ENVIRONMENT}-latest"
        if [ "$ENVIRONMENT" = "production" ]; then
          TAGS="$TAGS --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY_RANALYSIS }}:latest"
        fi

        docker buildx build \
          --platform linux/amd64 \
          --cache-from=type=gha,scope=ranalysis-${ENVIRONMENT} \
          --cache-to=type=gha,mode=max,scope=ranalysis-${ENVIRONMENT} \
          $TAGS \
          --push \
          --file r-analysis/Dockerfile \
          r-analysis/

        echo "::notice::Pushed R analysis image: $IMAGE_URI"
