name: Publish R-Analysis Script
run-name: "Publish ${{ github.ref_name }} to ${{ github.event_name == 'workflow_dispatch' && inputs.api_environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}"

on:
  push:
    branches:
      - main
    paths:
      - 'r-analysis/configuration.json'
      - 'r-analysis/requirements.txt'
      - 'r-analysis/src/**'
      - 'r-analysis/scripts/**'
      - '.github/workflows/publish-script.yml'
  workflow_dispatch:
    inputs:
      api_environment:
        description: 'Target API environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  STAGING_API_URL: https://api-staging.trends.earth
  PRODUCTION_API_URL: https://api.trends.earth

jobs:
  publish-script:
    name: Publish to trends.earth API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install trends.earth CLI
        run: pip install git+https://github.com/ConservationInternational/trends.earth-CLI.git

      - name: Determine API URL
        id: api-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.api_environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "url=${{ env.PRODUCTION_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ env.STAGING_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure CLI
        run: |
          printf 'url_api: "%s"\n' "${{ steps.api-url.outputs.url }}" > ~/.tecli.yml

      - name: Obtain access token via OAuth2 Client Credentials
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          CLIENT_ID: ${{ secrets.TRENDSEARTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TRENDSEARTH_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -sf -X POST "${API_URL}/api/v1/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${CLIENT_ID}\",\"client_secret\":\"${CLIENT_SECRET}\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to obtain access token"
            exit 1
          fi

          # Write JWT and expiration into CLI config so the CLI
          # recognises the token as valid and skips refresh.
          python3 -c "
          import yaml
          from datetime import datetime, timedelta
          with open('$HOME/.tecli.yml', 'r') as f:
              cfg = yaml.safe_load(f) or {}
          cfg['JWT'] = '${TOKEN}'
          expires_in = int('${EXPIRES_IN}') if '${EXPIRES_IN}' not in ('', 'null') else 1800
          cfg['token_expires_at'] = (datetime.now() + timedelta(seconds=expires_in)).isoformat()
          with open('$HOME/.tecli.yml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          "
          echo "::notice::Access token obtained successfully"

      - name: Publish script
        run: |
          cd r-analysis
          trends publish --overwrite

      - name: Verify publication
        run: |
          cd r-analysis
          trends info
